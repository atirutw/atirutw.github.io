<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en-US' }}">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}

    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>
    <div class="site-layout container-lg px-3 my-5 markdown-body">
        <aside class="site-sidebar" aria-label="Primary navigation">
            <h1 class="site-title"><a href="{{ '/' | absolute_url }}">{{ site.title }}</a></h1>
            <nav class="site-nav" aria-label="Site links">
                <a href="{{ '/' | relative_url }}">Home</a>
                <a href="{{ '/posts/' | relative_url }}">Posts</a>
                <a href="{{ '/feed.xml' | relative_url }}">Feed</a>
            </nav>
            <hr>
            <nav class="site-social" aria-label="Social links">
                <a href="https://github.com/atirutw" aria-label="GitHub profile"><i class="bi bi-github"
                        aria-hidden="true"></i></a>
                <a href="https://toot.community/@Atirut" rel="me" aria-label="Mastodon profile"><i
                        class="bi bi-mastodon" aria-hidden="true"></i></a>
            </nav>
        </aside>

        <main class="site-main" aria-label="Content">
            {{ content }}
        </main>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.1.0/anchor.min.js"
        integrity="sha256-lZaRhKri35AyJSypXXs4o6OPFTbTmUoltBbDCbdzegg=" crossorigin="anonymous"></script>
    <script>anchors.add('.site-main h1, .site-main h2, .site-main h3');</script>
</body>

</html>
